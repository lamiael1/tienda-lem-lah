spring.application.name=tienda-lem-lah-web

# Base de datos H2 en memoria
spring.datasource.url=jdbc:h2:mem:shop;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Estas dos propiedades hacen que data.sql se ejecute DESPUES de que
# Hibernate haya creado las tablas.
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Ubicacion explicita del data.sql porque esta en subcarpeta data/
spring.sql.init.data-locations=classpath:data/data.sql

# Consola H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console