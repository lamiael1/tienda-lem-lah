spring.application.name=tienda-lem-lah-web

# Base de datos H2 en memoria
spring.datasource.url=jdbc:h2:mem:shop;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CRÍTICO: estas dos líneas hacen que data.sql se ejecute DESPUÉS de que
# Hibernate cree las tablas. Sin ellas, data.sql falla en silencio.
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Consola H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console