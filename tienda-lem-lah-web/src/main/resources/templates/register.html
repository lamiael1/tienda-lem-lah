<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro · Crown &amp; Collar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: header(paginaActiva='')}"></div>

<div class="container py-5" style="max-width: 560px;">
    <h2 class="mb-1">Crear cuenta</h2>
    <p class="text-muted mb-4">Acceso exclusivo · Crown &amp; Collar</p>

    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/register}" method="post" th:object="${registro}">

        <div class="row mb-3">
            <div class="col">
                <label for="nombre" class="form-label">Nombre <span class="text-danger">*</span></label>
                <input type="text" id="nombre" class="form-control"
                       th:field="*{nombre}" placeholder="Tu nombre" required>
            </div>
            <div class="col">
                <label for="apellidos" class="form-label">Apellidos <span class="text-danger">*</span></label>
                <input type="text" id="apellidos" class="form-control"
                       th:field="*{apellidos}" placeholder="Tus apellidos" required>
            </div>
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">Correo electrónico <span class="text-danger">*</span></label>
            <input type="email" id="email" class="form-control"
                   th:field="*{email}" placeholder="tu@email.com" required>
        </div>

        <div class="mb-3">
            <label for="telefono" class="form-label">
                Teléfono <span class="text-muted small">(opcional)</span>
            </label>
            <input type="tel" id="telefono" class="form-control"
                   th:field="*{telefono}" placeholder="+34 600 000 000">
        </div>

        <div class="mb-3">
            <label for="password" class="form-label">Contraseña <span class="text-danger">*</span></label>
            <input type="password" id="password" class="form-control"
                   th:field="*{password}" placeholder="Mínimo 8 caracteres" required>
        </div>

        <div class="mb-4 form-check">
            <input type="checkbox" id="aceptaCondiciones" class="form-check-input"
                   th:field="*{aceptaCondiciones}">
            <label for="aceptaCondiciones" class="form-check-label">
                Acepto los <a th:href="@{/condiciones}">términos y condiciones</a>
                de Crown &amp; Collar
            </label>
        </div>

        <button type="submit" class="btn btn-primary w-100">Crear mi cuenta</button>
    </form>

    <p class="text-center mt-3 small">
        ¿Ya tienes cuenta?
        <a th:href="@{/login}">Inicia sesión aquí</a>
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
