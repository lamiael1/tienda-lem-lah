<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro · Crown &amp; Collar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .login-wrapper {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--beige-premium);
            padding: 3rem 1rem;
        }
        .login-card {
            background: var(--blanco-puro);
            padding: 3rem 2.5rem;
            box-shadow: var(--shadow-deep);
            width: 100%;
            max-width: 560px;
        }
        .login-titulo {
            font-family: var(--font-display);
            font-size: 2rem;
            color: var(--verde-oscuro);
            text-align: center;
            margin-bottom: 0.3rem;
        }
        .login-subtitulo {
            text-align: center;
            color: var(--dorado);
            font-size: 0.8rem;
            letter-spacing: 0.12em;
            margin-bottom: 2rem;
        }
        .login-label {
            display: block;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--verde-oscuro);
            font-weight: 600;
            margin-bottom: 0.4rem;
        }
        .login-input {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1px solid #d0cec5;
            background: var(--beige-premium);
            font-family: var(--font-body);
            font-size: 0.95rem;
            color: var(--negro-suave);
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 1.2rem;
        }
        .login-input:focus { border-color: var(--dorado); }
        .login-btn {
            width: 100%;
            padding: 1rem;
            background: var(--dorado);
            color: var(--verde-oscuro);
            border: none;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }
        .login-btn:hover { background: var(--dorado-hover); }
        .login-error {
            background: #fdf2f2;
            border-left: 3px solid #c0392b;
            padding: 0.8rem 1rem;
            color: #c0392b;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .login-divider {
            border: none;
            border-top: 1px solid #e8e5d9;
            margin: 1.5rem 0;
        }
        .login-links {
            text-align: center;
            font-size: 0.85rem;
            color: #666;
        }
        .login-links a { color: var(--dorado); font-weight: 600; }
        .row-inputs { display: flex; gap: 1rem; }
        .row-inputs > div { flex: 1; }
        .check-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1.5rem;
        }
        .check-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--dorado); }
        .check-row label { font-size: 0.85rem; color: var(--negro-suave); }
        .check-row a { color: var(--dorado); font-weight: 600; }
    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: header(paginaActiva='')}"></div>

<main class="login-wrapper">
    <div class="login-card">

        <h2 class="login-titulo">Crear cuenta</h2>
        <p class="login-subtitulo">ACCESO EXCLUSIVO · CROWN &amp; COLLAR</p>

        <div class="login-error" th:if="${error}" th:text="${error}"></div>

        <form th:action="@{/register}" method="post" th:object="${registro}">

            <div class="row-inputs">
                <div>
                    <label for="nombre" class="login-label">Nombre <span style="color:#c0392b">*</span></label>
                    <input type="text" id="nombre" class="login-input"
                           th:field="*{nombre}" placeholder="Tu nombre" required>
                </div>
                <div>
                    <label for="apellidos" class="login-label">Apellidos <span style="color:#c0392b">*</span></label>
                    <input type="text" id="apellidos" class="login-input"
                           th:field="*{apellidos}" placeholder="Tus apellidos" required>
                </div>
            </div>

            <label for="email" class="login-label">Correo electrónico <span style="color:#c0392b">*</span></label>
            <input type="email" id="email" class="login-input"
                   th:field="*{email}" placeholder="tu@email.com" required>

            <label for="telefono" class="login-label">
                Teléfono <span style="color:#999; font-size:0.75rem; text-transform:none">(opcional)</span>
            </label>
            <input type="tel" id="telefono" class="login-input"
                   th:field="*{telefono}" placeholder="+34 600 000 000">

            <label for="password" class="login-label">Contraseña <span style="color:#c0392b">*</span></label>
            <input type="password" id="password" class="login-input"
                   th:field="*{password}" placeholder="Mínimo 8 caracteres" required>

            <div class="check-row">
                <input type="checkbox" id="aceptaCondiciones"
                       th:field="*{aceptaCondiciones}">
                <label for="aceptaCondiciones">
                    Acepto los <a th:href="@{/condiciones}">términos y condiciones</a>
                    de Crown &amp; Collar
                </label>
            </div>

            <button type="submit" class="login-btn">Crear mi cuenta</button>
        </form>

        <hr class="login-divider">

        <div class="login-links">
            ¿Ya tienes cuenta?
            <a th:href="@{/login}">Inicia sesión aquí</a>
        </div>

    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
