<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil · Crown &amp; Collar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: header(paginaActiva='')}"></div>

<div class="container py-5" style="max-width: 680px;">
    <h2 class="mb-4">Perfil de usuario</h2>

    <div class="card shadow-sm">
        <div class="card-body">

            <div class="row mb-3">
                <div class="col-sm-4 fw-semibold text-muted">Nombre completo</div>
                <div class="col-sm-8"
                     th:text="${usuario.nombre + ' ' + usuario.apellidos}"></div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-4 fw-semibold text-muted">Correo electrónico</div>
                <div class="col-sm-8" th:text="${usuario.email}"></div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-4 fw-semibold text-muted">Teléfono</div>
                <div class="col-sm-8"
                     th:text="${usuario.telefono != null ? usuario.telefono : 'No facilitado'}">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-4 fw-semibold text-muted">Fecha de nacimiento</div>
                <div class="col-sm-8"
                     th:text="${usuario.fechaNacimiento != null ? usuario.fechaNacimiento : 'No facilitada'}">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-4 fw-semibold text-muted">Miembro desde</div>
                <div class="col-sm-8"
                     th:text="${#temporals.format(usuario.fechaRegistro, 'dd/MM/yyyy HH:mm')}">
                </div>
            </div>

            <div class="row" th:if="${!usuario.roles.isEmpty()}">
                <div class="col-sm-4 fw-semibold text-muted">Roles</div>
                <div class="col-sm-8">
                    <span th:each="rol : ${usuario.roles}"
                          class="badge bg-dark me-1"
                          th:text="${rol.descripcion}">
                    </span>
                </div>
            </div>

        </div>
    </div>

    <a th:href="@{/}" class="btn btn-secondary mt-3">← Volver a la tienda</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
