<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Acceso · Crown &amp; Collar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .login-wrapper {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--beige-premium);
            padding: 3rem 1rem;
        }
        .login-card {
            background: var(--blanco-puro);
            padding: 3rem 2.5rem;
            box-shadow: var(--shadow-deep);
            width: 100%;
            max-width: 440px;
        }
        .login-titulo {
            font-family: var(--font-display);
            font-size: 2rem;
            color: var(--verde-oscuro);
            text-align: center;
            margin-bottom: 0.3rem;
        }
        .login-subtitulo {
            text-align: center;
            color: var(--dorado);
            font-size: 0.8rem;
            letter-spacing: 0.12em;
            margin-bottom: 2rem;
        }
        .login-label {
            display: block;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--verde-oscuro);
            font-weight: 600;
            margin-bottom: 0.4rem;
        }
        .login-input {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1px solid #d0cec5;
            background: var(--beige-premium);
            font-family: var(--font-body);
            font-size: 0.95rem;
            color: var(--negro-suave);
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 1.2rem;
        }
        .login-input:focus { border-color: var(--dorado); }
        .login-btn {
            width: 100%;
            padding: 1rem;
            background: var(--dorado);
            color: var(--verde-oscuro);
            border: none;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-btn:hover { background: var(--dorado-hover); }
        .login-error {
            background: #fdf2f2;
            border-left: 3px solid #c0392b;
            padding: 0.8rem 1rem;
            color: #c0392b;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .login-divider {
            border: none;
            border-top: 1px solid #e8e5d9;
            margin: 1.5rem 0;
        }
        .login-links {
            text-align: center;
            font-size: 0.85rem;
            color: #666;
        }
        .login-links a { color: var(--dorado); font-weight: 600; }
    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: header(paginaActiva='')}"></div>

<main class="login-wrapper">
    <div class="login-card">

        <h2 class="login-titulo">Acceso privado</h2>
        <p class="login-subtitulo">ÁREA DE CLIENTES · CROWN &amp; COLLAR</p>

        <!--
            Spring Security añade ?error a la URL cuando las credenciales son incorrectas.
            El enunciado exige mostrar "Usuario y/o contraseña incorrectos" en ese caso.
        -->
        <div class="login-error" th:if="${param.error}">
            Usuario y/o contraseña incorrectos. Inténtalo de nuevo.
        </div>

        <!--
            El form hace POST a /login.
            Spring Security intercepta este endpoint y valida las credenciales.
            th:action inyecta el token CSRF automáticamente.
        -->
        <form th:action="@{/login}" method="post">

            <label for="username" class="login-label">Correo electrónico</label>
            <!--
                El name DEBE ser "username" — es el parámetro
                que lee Spring Security por defecto.
            -->
            <input type="email"
                   id="username"
                   name="username"
                   class="login-input"
                   placeholder="tu@email.com"
                   autocomplete="email"
                   required>

            <label for="password" class="login-label">Contraseña</label>
            <input type="password"
                   id="password"
                   name="password"
                   class="login-input"
                   placeholder="Tu contraseña"
                   autocomplete="current-password"
                   required>

            <button type="submit" class="login-btn">Entrar</button>

        </form>

        <hr class="login-divider">

        <div class="login-links">
            ¿Aún no tienes cuenta?
            <a th:href="@{/register}">Regístrate aquí</a>
        </div>

    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
