<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${categoria.nombre} + ' · Crown &amp; Collar'">Detalle</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="fondo-oscuro">

<div th:replace="~{fragments/navbar :: header(paginaActiva='categorias')}"></div>

<section class="hero-detalle">
    <div class="hero-detalle-imagen">
        <img th:src="@{'/imagenes/categorias/' + ${categoria.imagen}}"
             th:alt="${categoria.nombre}">
    </div>
    <div class="hero-detalle-texto">
        <p class="hero-edicion"
           th:text="${categoria.tipo == 'perros'} ? 'COLECCIÓN CANINA' : 'COLECCIÓN FELINA'"></p>
        <h2 class="hero-titulo" th:text="${categoria.nombre}"></h2>
        <p class="hero-desc" th:text="${categoria.descripcion}"></p>
        <a th:href="@{/categorias(tipo=${categoria.tipo})}" class="btn-volver">← Volver a Colecciones</a>
    </div>
</section>

<!-- PRODUCTOS DE ESTA CATEGORÍA con lógica 0 / 1 / varios -->
<section class="detalle-info">
    <h3>Productos en esta colección</h3>

    <!-- Sin productos -->
    <p th:if="${#sets.isEmpty(categoria.productos)}">
        No hay productos disponibles en esta colección por el momento.
    </p>

    <!-- Un solo producto -->
    <div th:if="${#sets.size(categoria.productos) == 1}">
        <div th:each="p : ${categoria.productos}" class="producto-card">
            <img th:src="${p.imagen != null ? '/imagenes/productos/' + p.imagen : '/imagenes/no-disponible.jpg'}"
                 th:alt="'Imagen de ' + ${p.nombre}">
            <h4>
                <a th:href="@{/productos/{id}/{slug}(id=${p.id}, slug=${#strings.replace(#strings.toLowerCase(p.nombre),' ','-')})}"
                   th:text="${p.nombre}"></a>
            </h4>
            <!-- Marca como enlace -->
            <p>
                <a th:href="@{/marcas/{id}(id=${p.marca.id})}" th:text="${p.marca.nombre}"></a>
            </p>
            <!-- Precio con o sin descuento -->
            <p th:if="${p.descuento == 0}" th:text="${p.precio} + '€'"></p>
            <div th:if="${p.descuento > 0}">
                <span class="badge-descuento" th:text="'-' + ${p.descuento} + '%'"></span>
                <span class="precio-actual" th:text="${#numbers.formatDecimal(p.precio * (1 - p.descuento / 100.0), 1, 2)} + '€'"></span>
                <span class="precio-original tachado" th:text="${p.precio} + '€'"></span>
            </div>
        </div>
    </div>

    <!-- Varios productos -->
    <div th:if="${#sets.size(categoria.productos) > 1}" class="productos-grid">
        <div th:each="p : ${categoria.productos}" class="producto-card">
            <img th:src="${p.imagen != null ? '/imagenes/productos/' + p.imagen : '/imagenes/no-disponible.jpg'}"
                 th:alt="'Imagen de ' + ${p.nombre}">
            <h4>
                <a th:href="@{/productos/{id}/{slug}(id=${p.id}, slug=${#strings.replace(#strings.toLowerCase(p.nombre),' ','-')})}"
                   th:text="${p.nombre}"></a>
            </h4>
            <p>
                <a th:href="@{/marcas/{id}(id=${p.marca.id})}" th:text="${p.marca.nombre}"></a>
            </p>
            <p th:if="${p.descuento == 0}" th:text="${p.precio} + '€'"></p>
            <div th:if="${p.descuento > 0}">
                <span class="badge-descuento" th:text="'-' + ${p.descuento} + '%'"></span>
                <span class="precio-actual" th:text="${#numbers.formatDecimal(p.precio * (1 - p.descuento / 100.0), 1, 2)} + '€'"></span>
                <span class="precio-original tachado" th:text="${p.precio} + '€'"></span>
            </div>
        </div>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
