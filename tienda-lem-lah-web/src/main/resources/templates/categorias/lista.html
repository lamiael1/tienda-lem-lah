<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Colecciones · Crown &amp; Collar</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: header(paginaActiva='categorias')}"></div>

<section class="colecciones-selector">
    <a th:href="@{/categorias(tipo='perros')}"
       class="btn-coleccion"
       th:classappend="${tipo == 'perros'} ? ' active' : ''">Perros</a>
    <a th:href="@{/categorias(tipo='gatos')}"
       class="btn-coleccion"
       th:classappend="${tipo == 'gatos'} ? ' active' : ''">Gatos</a>
</section>

<section class="hero-aristocratico" style="padding-top:3rem; padding-bottom:3rem;">
    <div class="hero-texto">
        <p class="hero-edicion"
           th:text="${tipo == 'perros'} ? 'COLECCIÓN CANINA' : 'COLECCIÓN FELINA'"></p>
        <h2 class="hero-titulo"
            th:text="${tipo == 'perros'} ? 'El Patrimonio Canino' : 'La Herencia Felina'"></h2>
        <p class="hero-desc"
           th:text="${tipo == 'perros'}
               ? 'Una curaduría sin compromiso de las mejores recetas para el compañero más leal.'
               : 'Para el espíritu independiente y el paladar refinado.'"></p>
    </div>
    <div class="hero-imagen">
        <img th:src="${tipo == 'perros'}
             ? '/imagenes/categorias/perros-patrimonio.png'
             : '/imagenes/categorias/gatos-herencia.png'"
             alt="">
    </div>
</section>

<section class="productos-grid">
    <div class="producto-card" th:each="cat : ${categorias}">
        <img th:src="@{'/imagenes/categorias/' + ${cat.imagen}}" th:alt="${cat.nombre}">
        <h4 th:text="${cat.nombre}"></h4>
        <p class="categoria" th:text="${cat.descripcion}"></p>
        <a class="btn-detalle" th:href="@{/categorias/{id}(id=${cat.id})}">Ver Detalles →</a>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
