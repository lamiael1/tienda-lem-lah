<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Categorías · Crown & Collar</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <h1>Crown & Collar</h1>
    <nav>
        <a th:href="@{/}">Inicio</a>
        <a th:href="@{/categorias}">Colecciones</a>
        <a href="/sobre-nosotros.html">Sobre nosotros</a>
        <a th:href="@{/condiciones}">Condiciones de uso</a>
    </nav>
</header>

<main>
    <h2>Nuestros Dominios</h2>

    <ul>
        <li th:each="categoria : ${categorias}">
            <div>
                <img th:if="${categoria.imagen != null}"
                     th:src="@{/imagenes/categorias/{img}(img=${categoria.imagen})}"
                     th:alt="${categoria.nombre}" width="200">

                <img th:unless="${categoria.imagen != null}"
                     th:src="@{/imagenes/categorias/no-disponible.png}"
                     th:alt="${categoria.nombre}" width="200">
            </div>

            <h3 th:text="${categoria.nombre}">Nombre</h3>
            <p th:text="${categoria.descripcion}">Descripción</p>
            <a th:href="@{/categorias/{id}(id=${categoria.id})}">Ver detalle</a>
        </li>
    </ul>
</main>

<footer>
    <p>&copy; 2026 CROWN & COLLAR. TODOS LOS DERECHOS RESERVADOS LEM LAH.</p>
</footer>
</body>
</html>
