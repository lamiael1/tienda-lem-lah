<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Productos · Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<div th:replace="~{fragments/admin-navbar :: admin-navbar}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Listado de Productos</h2>
        <a th:href="@{/admin/productos/new}" class="btn btn-success">
            <i class="bi bi-plus-circle" aria-hidden="true"></i> Nuevo Producto
        </a>
    </div>

    <table class="table table-striped table-bordered align-middle">
        <thead class="table-dark">
        <tr>
            <th scope="col">ID</th>
            <th scope="col">EAN</th>
            <th scope="col">Nombre</th>
            <th scope="col">Marca</th>
            <th scope="col">Precio</th>
            <th scope="col">Dto.</th>
            <th scope="col">Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${productos}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.codigoEan}"></td>
            <td th:text="${p.nombre}"></td>
            <td th:text="${p.marca != null ? p.marca.nombre : '—'}"></td>
            <td th:text="${p.precio} + '€'"></td>
            <td th:text="${p.descuento} + '%'"></td>
            <td>
                <a th:href="@{'/admin/productos/' + ${p.id} + '/edit'}"
                   class="btn btn-sm btn-warning me-1"
                   th:aria-label="'Editar producto ' + ${p.nombre}">
                    <i class="bi bi-pencil-fill" aria-hidden="true"></i>
                    <span class="visually-hidden" th:text="'Editar ' + ${p.nombre}"></span>
                </a>
                <a th:href="@{'/admin/productos/' + ${p.id} + '/delete'}"
                   class="btn btn-sm btn-danger"
                   th:aria-label="'Eliminar producto ' + ${p.nombre}">
                    <i class="bi bi-trash-fill" aria-hidden="true"></i>
                    <span class="visually-hidden" th:text="'Eliminar ' + ${p.nombre}"></span>
                </a>
            </td>
        </tr>
        </tbody>
        <tfoot>
        <tr>
            <td colspan="7" class="text-muted small"
                th:text="${productos.size()} + ' productos en total'"></td>
        </tr>
        </tfoot>
    </table>

    <a th:href="@{/admin/productos/new}" class="btn btn-success">
        <i class="bi bi-plus-circle" aria-hidden="true"></i> Nuevo Producto
    </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
