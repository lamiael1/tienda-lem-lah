<h2>Editar Producto</h2>

<form th:action="@{'/admin/productos/' + ${producto.id} + '/edit'}"
      method="post" th:object="${producto}">

    <label for="nombre">Nombre:</label>
    <input id="nombre" type="text" th:field="*{nombre}" required>

    <label for="codigoEan">Código EAN:</label>
    <input id="codigoEan" type="text" th:field="*{codigoEan}" required>

    <label for="descripcion">Descripción:</label>
    <textarea id="descripcion" th:field="*{descripcion}"></textarea>

    <label for="precio">Precio:</label>
    <input id="precio" type="number" step="0.01" th:field="*{precio}" required>

    <label for="descuento">Descuento (%):</label>
    <input id="descuento" type="number" min="0" max="100" th:field="*{descuento}">

    <label>Marca:</label>
    <select th:field="*{marca.id}">
        <option th:each="m : ${marcas}" th:value="${m.id}" th:text="${m.nombre}"></option>
    </select>

    <label>Categorías:</label>
    <div th:each="c : ${categorias}">
        <input type="checkbox" th:value="${c.id}" th:field="*{categorias}">
        <span th:text="${c.nombre}"></span>
    </div>

    <button type="submit" class="btn btn-primary">Actualizar</button>
    <a th:href="@{/admin/productos}" class="btn btn-secondary">Cancelar</a>
</form>
