<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${producto.nombre} + ' · Crown &amp; Collar'">Detalle Producto</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="fondo-oscuro">

<div th:replace="~{fragments/navbar :: header(paginaActiva='productos')}"></div>

<section class="hero-detalle">
    <div class="hero-detalle-imagen">
        <img th:if="${producto.imagen != null}"
             th:src="@{'/imagenes/productos/' + ${producto.imagen}}"
             th:alt="'Imagen de ' + ${producto.nombre}">

        <img th:if="${producto.imagen == null}"
             src="/imagenes/no-disponible.jpg"
             alt="">
    </div>

    <div class="hero-detalle-texto">
        <h2 class="hero-titulo" th:text="${producto.nombre}"></h2>

        <p><strong>EAN-13:</strong> <span th:text="${producto.codigoEan}"></span></p>

        <p th:if="${producto.marca != null}">
            <strong>Marca:</strong>
            <a th:href="@{/marcas/{id}/{nombre}(id=${producto.marca.id}, nombre=${producto.marca.nombre})}"
               th:text="${producto.marca.nombre}"></a>
        </p>

        <p th:if="${producto.descuento == 0}" class="precio" th:text="${producto.precio} + '€'"></p>
        <div th:if="${producto.descuento > 0}">
            <span class="badge-descuento" th:text="'-' + ${producto.descuento} + '%'"></span>
            <span class="precio-actual"
                  th:text="${#numbers.formatDecimal(producto.precio * (1 - producto.descuento / 100.0), 1, 2)} + '€'"></span>
            <span class="precio-original tachado" th:text="${producto.precio} + '€'"></span>
        </div>

        <p th:text="${producto.descripcion}" class="hero-desc"></p>

        <div th:if="${not #lists.isEmpty(producto.categorias)}">
            <strong>Colecciones:</strong>

            <p th:if="${#lists.size(producto.categorias) == 1}">
                <a th:href="@{/categorias/{id}/{nombre}(id=${producto.categorias[0].id}, nombre=${producto.categorias[0].nombre})}"
                   th:text="${producto.categorias[0].nombre}"></a>
            </p>

            <ul th:if="${#lists.size(producto.categorias) > 1}">
                <li th:each="c : ${producto.categorias}">
                    <a th:href="@{/categorias/{id}/{nombre}(id=${c.id}, nombre=${c.nombre})}"
                       th:text="${c.nombre}"></a>
                </li>
            </ul>
        </div>

        <a th:href="@{/productos}" class="btn-volver" aria-label="Volver al listado de productos">← Volver al listado</a>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
