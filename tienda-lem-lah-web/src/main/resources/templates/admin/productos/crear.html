<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Producto · Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div th:replace="~{fragments/admin-navbar :: admin-navbar}"></div>

<div class="container py-4" style="max-width: 720px;">
    <h2 class="mb-4">Nuevo Producto</h2>

    <div th:if="${error}" class="alert alert-danger" role="alert">
        <strong>Error al guardar:</strong> <span th:text="${error}"></span>
    </div>

    <!--
      IMPORTANTE: la marca y las categorías se envían como parámetros separados
      (marcaId y categoriaIds) en lugar de binding directo sobre el objeto,
      para evitar problemas de conversión JPA. El controlador los recoge
      con @RequestParam y los resuelve manualmente.
    -->
    <form th:action="@{/admin/productos}" method="post" th:object="${producto}">

        <div class="mb-3">
            <label for="codigoEan" class="form-label">Código EAN-13 <span class="text-danger">*</span></label>
            <input id="codigoEan" type="text" class="form-control"
                   th:field="*{codigoEan}" maxlength="13" placeholder="0000000000000">
        </div>

        <div class="mb-3">
            <label for="nombre" class="form-label">Nombre <span class="text-danger">*</span></label>
            <input id="nombre" type="text" class="form-control"
                   th:field="*{nombre}" maxlength="200">
        </div>

        <div class="mb-3">
            <label for="descripcion" class="form-label">Descripción <span class="text-danger">*</span></label>
            <textarea id="descripcion" class="form-control" rows="4"
                      th:field="*{descripcion}" maxlength="4000"></textarea>
        </div>

        <div class="mb-3">
            <label for="imagen" class="form-label">Nombre de imagen</label>
            <input id="imagen" type="text" class="form-control"
                   th:field="*{imagen}" maxlength="500" placeholder="imagen.jpg">
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label for="precio" class="form-label">Precio (€) <span class="text-danger">*</span></label>
                <input id="precio" type="number" step="0.01" min="0" class="form-control"
                       th:field="*{precio}">
            </div>
            <div class="col-md-6">
                <label for="descuento" class="form-label">Descuento (%) <span class="text-danger">*</span></label>
                <input id="descuento" type="number" min="0" max="99" class="form-control"
                       th:field="*{descuento}">
                <div class="form-text">0 si no tiene descuento.</div>
            </div>
        </div>

        <!-- SELECT para la marca -->
        <div class="mb-3">
            <label for="marcaId" class="form-label">Marca <span class="text-danger">*</span></label>
            <select id="marcaId" name="marcaId" class="form-select">
                <option value="">-- Seleccione una marca --</option>
                <option th:each="m : ${marcas}"
                        th:value="${m.id}"
                        th:text="${m.nombre}"></option>
            </select>
        </div>

        <!-- CHECKBOXES para categorías -->
        <div class="mb-3">
            <label class="form-label">Categorías</label>
            <div class="border rounded p-3 bg-white">
                <div th:each="c : ${categorias}" class="form-check">
                    <input class="form-check-input" type="checkbox"
                           name="categoriaIds"
                           th:value="${c.id}"
                           th:id="'cat-' + ${c.id}">
                    <label class="form-check-label"
                           th:for="'cat-' + ${c.id}"
                           th:text="${c.nombre} + ' (' + ${c.tipo} + ')'"></label>
                </div>
            </div>
            <div class="form-text">Puede seleccionar ninguna, una o varias.</div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-floppy" aria-hidden="true"></i> Guardar
            </button>
            <a th:href="@{/admin/productos}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
