<h2>Nuevo Producto</h2>
<form th:action="@{/admin/productos}" method="post" th:object="${producto}">
    <label>Nombre:</label>
    <input type="text" th:field="*{nombre}" required>

    <label>Código EAN:</label>
    <input type="text" th:field="*{codigoEan}" required>

    <label>Descripción:</label>
    <textarea th:field="*{descripcion}"></textarea>

    <label>Precio:</label>
    <input type="number" step="0.01" th:field="*{precio}" required>

    <label>Descuento (%):</label>
    <input type="number" th:field="*{descuento}" min="0" max="100">

    <label>Marca:</label>
    <select th:field="*{marca.id}">
        <option th:each="m : ${marcas}" th:value="${m.id}" th:text="${m.nombre}"></option>
    </select>

    <label>Categorías:</label>
    <div th:each="c : ${categorias}">
        <input type="checkbox" th:value="${c.id}" th:field="*{categorias}" th:text="${c.nombre}">
    </div>

    <button type="submit" class="btn btn-primary">Guardar</button>
    <a th:href="@{/admin/productos}" class="btn btn-secondary">Cancelar</a>
</form>
