<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Marcas · Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<div th:replace="~{fragments/admin-navbar :: admin-navbar}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Listado de Marcas</h2>
        <a th:href="@{/admin/marcas/new}" class="btn btn-success">
            <i class="bi bi-plus-circle" aria-hidden="true"></i> Nueva Marca
        </a>
    </div>

    <table class="table table-striped table-bordered align-middle">
        <thead class="table-dark">
        <tr>
            <th scope="col">ID</th>
            <th scope="col">Nombre</th>
            <th scope="col">Descripción</th>
            <th scope="col">Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="m : ${marcas}">
            <td th:text="${m.id}"></td>
            <td th:text="${m.nombre}"></td>
            <td th:text="${m.descripcion}"></td>
            <td>
                <a th:href="@{'/admin/marcas/' + ${m.id} + '/edit'}"
                   class="btn btn-sm btn-warning me-1"
                   th:aria-label="'Editar marca ' + ${m.nombre}">
                    <i class="bi bi-pencil-fill" aria-hidden="true"></i>
                    <span class="visually-hidden" th:text="'Editar ' + ${m.nombre}"></span>
                </a>
                <a th:href="@{'/admin/marcas/' + ${m.id} + '/delete'}"
                   class="btn btn-sm btn-danger"
                   th:aria-label="'Eliminar marca ' + ${m.nombre}">
                    <i class="bi bi-trash-fill" aria-hidden="true"></i>
                    <span class="visually-hidden" th:text="'Eliminar ' + ${m.nombre}"></span>
                </a>
            </td>
        </tr>
        </tbody>
        <tfoot>
        <tr>
            <td colspan="4" class="text-muted small"
                th:text="${marcas.size()} + ' marcas en total'"></td>
        </tr>
        </tfoot>
    </table>

    <a th:href="@{/admin/marcas/new}" class="btn btn-success">
        <i class="bi bi-plus-circle" aria-hidden="true"></i> Nueva Marca
    </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
