<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Marca · Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div th:replace="~{fragments/admin-navbar :: admin-navbar}"></div>

<div class="container py-4" style="max-width: 640px;">
    <h2 class="mb-4">Editar Marca</h2>

    <div th:if="${error}" class="alert alert-danger" role="alert">
        <strong>Error al guardar:</strong> <span th:text="${error}"></span>
    </div>

    <form th:action="@{'/admin/marcas/' + ${marca.id} + '/edit'}"
          method="post" th:object="${marca}">

        <div class="mb-3">
            <label for="nombre" class="form-label">Nombre <span class="text-danger">*</span></label>
            <input id="nombre" type="text" class="form-control"
                   th:field="*{nombre}" maxlength="100">
        </div>

        <div class="mb-3">
            <label for="descripcion" class="form-label">Descripción</label>
            <textarea id="descripcion" class="form-control" rows="3"
                      th:field="*{descripcion}" maxlength="2000"></textarea>
        </div>

        <div class="mb-3">
            <label for="imagen" class="form-label">Nombre de imagen</label>
            <input id="imagen" type="text" class="form-control"
                   th:field="*{imagen}" maxlength="500">
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-floppy" aria-hidden="true"></i> Actualizar
            </button>
            <a th:href="@{/admin/marcas}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
