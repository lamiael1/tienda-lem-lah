<h2>Eliminar Marca</h2>

<p th:text="'¿Seguro que desea borrar la marca ' + ${marca.nombre} + '?'"></p>

<form th:action="@{'/admin/marcas/' + ${marca.id} + '/delete'}" method="post">
    <button type="submit" class="btn btn-danger">Eliminar</button>
    <a th:href="@{/admin/marcas}" class="btn btn-secondary">Cancelar</a>
</form>
