<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Marca · Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div th:replace="~{fragments/admin-navbar :: admin-navbar}"></div>

<div class="container py-4" style="max-width: 540px;">
    <h2 class="mb-4">Eliminar Marca</h2>

    <div th:if="${error}" class="alert alert-danger" role="alert">
        <strong>Error al eliminar:</strong> <span th:text="${error}"></span>
    </div>

    <div class="card border-danger">
        <div class="card-body">
            <p class="card-text fs-5">
                ¿Seguro que desea borrar la marca
                <strong th:text="${marca.nombre}"></strong>?
            </p>
            <p class="text-muted small">Esta acción no se puede deshacer.</p>

            <form th:action="@{'/admin/marcas/' + ${marca.id} + '/delete'}" method="post">
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash-fill" aria-hidden="true"></i> Eliminar
                    </button>
                    <a th:href="@{/admin/marcas}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
